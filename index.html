<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Mini-Sites Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">

    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black text-slate-900 mb-2">🚀 Générateur de Mini-Sites de Niche</h1>
            <p class="text-lg text-slate-600">Créez des pages de vente illimitées pour Systeme.io & 1TPE sans technique.</p>
        </header>

        <div class="bg-white shadow-xl rounded-2xl p-8 border border-slate-200">
            <div class="mb-8 p-4 bg-blue-50 border-l-4 border-blue-500 rounded">
                <p class="text-sm text-blue-800">
                    <strong>Note :</strong> Pour encaisser vos commissions, vous devez avoir un compte. 
                    <a href="https://systeme.io/?sa=sa16047325683a6745455482376be9c81d" class="font-bold underline" target="_blank">Cliquez ici pour créer votre compte gratuit Systeme.io</a>.
                </p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block font-bold mb-2 text-slate-700">1. Votre ID Affilié (Sio ou 1TPE)</label>
                    <input type="text" id="user-id" placeholder="Ex: sa1604732568..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block font-bold mb-2 text-slate-700">2. Titre de votre produit</label>
                    <input type="text" id="prod-name" placeholder="Ex: Méthode Guitare Express" class="w-full p-3 border rounded-lg outline-none">
                </div>

                <div>
                    <label class="block font-bold mb-2 text-slate-700">3. Collez votre texte rédigé par l'IA</label>
                    <textarea id="prod-text" rows="8" placeholder="Copiez-collez ici le texte généré par ChatGPT..." class="w-full p-3 border rounded-lg outline-none"></textarea>
                </div>

                <button onclick="generateZip()" id="btn-main" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl text-xl shadow-lg transition transform hover:scale-105">
                    📥 Télécharger mon Mini-Site (ZIP)
                </button>
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-400 text-sm">
            Propulsé par <a href="https://generateurpdvgratuit1tpe.hitpresence.com/" class="underline">Hitpresence</a> | 
            <a href="https://jecreemonactivite.com" class="underline">JeCréeMonActivité</a>
        </footer>
    </div>

    <script src="engine.js"></script>
</body>
</html>
